<style>
:root{
  --bg:#f5f5f5;--card-bg:#fff;--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --header:#2563eb;--header-text:#fff;--tab-bg:#fff;--tab-border:#e5e7eb;
  --accent:#2563eb;--tag-bg:#dbeafe;--tag-text:#1e40af;--border:#e5e7eb;

}
.dark{
  --bg:#0f172a;--card-bg:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --header:#1e3a5f;--header-text:#e2e8f0;--tab-bg:#1e293b;--tab-border:#334155;
  --accent:#60a5fa;--tag-bg:#1e3a5f;--tag-text:#93c5fd;--border:#334155;
  --hover:#1e293b;--code-bg:#1e293b;--quote-bg:#1e293b;
}
.font-sm{--font:12px}.font-md{--font:14px}.font-lg{--font:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:var(--font);max-width:100vw;overflow-x:hidden;padding-bottom:70px;transition:background .3s,color .3s}
.header{background:var(--header);color:var(--header-text);padding:16px 20px;position:sticky;top:0;z-index:10}
.header h1{font-size:calc(var(--font) + 4px);font-weight:700}
.tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--tab-bg);border-top:1px solid var(--tab-border);z-index:10;height:60px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:calc(var(--font) - 3px);color:var(--text3);cursor:pointer;border:none;background:none}
.tab.active{color:var(--accent)}.tab svg{width:22px;height:22px;margin-bottom:2px}
.page{display:none;padding:12px 16px}

.card{background:var(--card-bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:transform .15s,box-shadow .15s,border .15s;border:2px solid transparent}
.card:active{transform:scale(1.02);box-shadow:0 4px 12px rgba(0,0,0,.15);border-color:var(--accent)}
.card h3{font-size:calc(var(--font) + 1px);margin-bottom:6px}
.card .date{font-size:calc(var(--font) - 2px);color:var(--text2);margin-bottom:8px}
.card .summary{font-size:calc(var(--font) - 1px);color:var(--text);line-height:1.6}
.card .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.card .tag{background:var(--tag-bg);color:var(--tag-text);font-size:calc(var(--font) - 4px);padding:2px 8px;border-radius:10px}
.card .actions{margin-top:10px;display:flex;gap:8px}
.card .actions button{font-size:calc(var(--font) - 2px);padding:6px 12px;border-radius:8px;border:none;cursor:pointer;background:var(--hover);color:var(--text)}
.card .actions button.fav{background:#fef3c7;color:#92400e}
.knowledge-section{margin-bottom:16px}
.knowledge-section h3{font-size:calc(var(--font) + 1px);color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.knowledge-item{background:var(--card-bg);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);cursor:pointer}
.knowledge-item:active{opacity:.7}
.knowledge-item .ki-title{font-size:calc(var(--font) - 1px);font-weight:600;margin-bottom:4px}
.knowledge-item .ki-what{font-size:calc(var(--font) - 2px);color:var(--text2);margin-bottom:2px}
.knowledge-item .ki-meta{font-size:calc(var(--font) - 4px);color:var(--text3)}
.level-tag{font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.detail{background:var(--card-bg);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:var(--font);line-height:1.8}

.detail h2{font-size:calc(var(--font) + 2px);color:var(--accent);margin:24px 0 10px;border-bottom:1px solid var(--border);padding-bottom:4px}
.detail h3{font-size:var(--font);margin:16px 0 8px}
.detail h4{font-size:calc(var(--font) - 1px);margin:12px 0 6px}
.detail p{margin:6px 0;font-size:var(--font)}
.detail ul{margin:6px 0 6px 20px}
.detail li{margin:2px 0;font-size:var(--font)}
.detail a{color:var(--accent)}
.detail hr{border:0;border-top:1px solid var(--border);margin:16px 0}
.detail table{border-collapse:collapse;width:100%;margin:10px 0;font-size:calc(var(--font) - 2px)}
.detail th,.detail td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.detail th{background:var(--hover)}
.detail blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;background:var(--quote-bg);color:var(--text2)}
.detail pre{background:var(--code-bg);padding:10px 14px;border-radius:6px;overflow-x:auto}
.detail code{background:var(--code-bg);padding:1px 4px;border-radius:3px}
.detail pre code{background:none;padding:0}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:calc(var(--font) - 1px);color:var(--accent);cursor:pointer;border:none;background:none;margin-bottom:12px}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-size:var(--font);outline:none;background:var(--card-bg);color:var(--text)}
.search-bar input:focus{border-color:var(--accent)}
.kb-filter{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.kb-filter button{font-size:calc(var(--font) - 3px);padding:4px 10px;border-radius:12px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer}.dark .kb-filter button{background:#1e293b;color:#e2e8f0;border-color:#334155}
.kb-filter button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.settings-group{margin-bottom:20px}
.settings-group h3{font-size:var(--font);color:var(--accent);margin-bottom:10px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row .label{font-size:calc(var(--font) - 1px)}
.setting-row .value{font-size:calc(var(--font) - 1px);color:var(--text2)}
.toggle{width:50px;height:28px;background:#d1d5db;border-radius:14px;position:relative;cursor:pointer;transition:background .3s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:24px;height:24px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .3s}
.toggle.on::after{left:24px}
.font-btns{display:flex;gap:6px}
.font-btns button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;font-size:calc(var(--font) - 1px)}
.font-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lang-select{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:calc(var(--font) - 1px)}
.author-info{text-align:center;padding:20px}
.author-info .name{font-size:calc(var(--font) + 2px);font-weight:600}
.author-info .ver{font-size:calc(var(--font) - 2px);color:var(--text3);margin-top:4px}
</style>

<script>
var REPORTS = [{"id": "ai-weekly-2026-07-09", "title": "AI 周报 2026-07-09", "date": "2026-07-09", "period": "2026年7月3日 – 2026年7月9日", "summary": "---", "keywords": "#具身智能 #世界模型 #Grok4.5 #GPT-Live #开源VLA #RoboDojo #蚂蚁灵波 #Agent", "body": "<h1>🤖 AI 周报 | 2026年7月3日 – 2026年7月9日</h1>\n<h2>📊 本周趋势</h2>\n<p><strong>具身智能迎来集中爆发。</strong> 本周最引人注目的主题无疑是具身智能与世界模型——蚂蚁灵波一次性开源了两大模型（LingBot-World 2.0 小时级世界模型 + LingBot-Video 具身视频基模），HuggingFace 热门论文前五中有四篇与具身智能/机器人操控相关，RoboDojo 评测基准更是揭示了一个残酷现实：人类 100 分的任务，最强机器人模型仅得 12.8 分。国内外同步出现了「开源 VLA」「统一具身基模型」等多个关键发布，具身智能的 ChatGPT 时刻似乎正在逼近。</p>\n<p><strong>大模型竞赛进入「降本+实时」新阶段。</strong> Grok 4.5 以「性价比之王」姿态突袭发布，马斯克用数万块 GB300 炼出了性能紧贴 Opus 4.8 却价格不到一半的模型。与此同时 OpenAI 发布 GPT-Live 语音模型，让 ChatGPT 真正「像真人一样说话」，同声传译行业一夜震动。大厂纷纷加入降本阵营——Microsoft 更多依赖自家模型，SambaNova 再融 10 亿美元（估值 110 亿），AI 芯片和推理加速成为新的资本热点。</p>\n<hr>\n<h2>🔬 AI 技术前沿</h2>\n<h3>蚂蚁灵波 LingBot-World 2.0：世界模型首次迎来「小时级」实时生成</h3>\n<ul>\n<li><strong>来源</strong>：量子位、机器之心</li>\n<li><strong>摘要</strong>：蚂蚁灵波发布 LingBot-World 2.0，实现两大首创——小时级实时世界模型生成 + AI 原生多人交互 Agent。支持动态场景中多个 Agent 实时「陪玩」。</li>\n<li><strong>为什么重要</strong>：世界模型从「离线生成」到「实时交互」的范式突破，直接指向具身智能的训练和部署效率。</li>\n<li><strong>链接</strong>：<a href=\"https://www.qbitai.com/2026/07/446548.html\" target=\"_blank\">https://www.qbitai.com/2026/07/446548.html</a></li>\n</ul>\n<h3>蚂蚁灵波开源 LingBot-Video：全球首个面向具身的视频基础模型</h3>\n<ul>\n<li><strong>来源</strong>：量子位、机器之心</li>\n<li><strong>摘要</strong>：基于 7 万小时具身数据的视频基础模型 LingBot-Video，面向机器人操控场景开源。同时发布的开源 VLA 模型支持 20 多种机器人。</li>\n<li><strong>为什么重要</strong>：具身智能领域长期缺乏高质量开源基础模型，蚂蚁灵波一次性补齐了视频基模 + VLA 两个缺口。</li>\n<li><strong>链接</strong>：<a href=\"https://www.qbitai.com/2026/07/446458.html\" target=\"_blank\">https://www.qbitai.com/2026/07/446458.html</a></li>\n</ul>\n<h3>RoboDojo：具身智能「高考」发布——人类 100 分，最强模型仅 12.8</h3>\n<ul>\n<li><strong>来源</strong>：HuggingFace Papers (92👍，本周最热)、量子位</li>\n<li><strong>摘要</strong>：统一仿真+真实机器人评测基准 RoboDojo，全面评估通用机器人操控策略。结果令人震惊：人类满分 100 分的情况下，最强模型仅得 12.8 分。</li>\n<li><strong>为什么重要</strong>：暴露了当前具身智能模型与人类水平之间的巨大鸿沟，将成为该领域的 ImageNet 时刻。</li>\n<li><strong>链接</strong>：<a href=\"https://huggingface.co/papers/2607.04434\" target=\"_blank\">https://huggingface.co/papers/2607.04434</a></li>\n</ul>\n<h3>Scaling Mixture-of-Experts Video Pretraining for Embodied Intelligence</h3>\n<ul>\n<li><strong>来源</strong>：HuggingFace Papers (77👍, 27 authors)</li>\n<li><strong>摘要</strong>：提出 MoE 视频预训练框架用于具身智能，通过大规模 Mixture-of-Experts 架构扩展视频预训练。</li>\n<li><strong>为什么重要</strong>：MoE 架构在语言模型成功后首次大规模应用于具身视频预训练，可能成为新范式。</li>\n<li><strong>链接</strong>：<a href=\"https://huggingface.co/papers/2607.07675\" target=\"_blank\">https://huggingface.co/papers/2607.07675</a></li>\n</ul>\n<h3>Dual Latent Memory in Vision-Language-Action Models for Robotic Manipulation</h3>\n<ul>\n<li><strong>来源</strong>：HuggingFace Papers</li>\n<li><strong>摘要</strong>：在 VLA 模型中引入双重潜在记忆机制，增强机器人操控的时序推理能力。</li>\n<li><strong>为什么重要</strong>：记忆机制是 VLA 模型从「反应式」到「规划式」的关键一步。</li>\n<li><strong>链接</strong>：<a href=\"https://huggingface.co/papers/2607.07608\" target=\"_blank\">https://huggingface.co/papers/2607.07608</a></li>\n</ul>\n<h3>智源悟界·Orca：让模型先理解世界如何变化</h3>\n<ul>\n<li><strong>来源</strong>：量子位</li>\n<li><strong>摘要</strong>：智源研究院发布悟界·Orca 世界模型，先教会模型理解物理世界的变化规律再让机器人操作，论文登顶 HuggingFace 月榜第一。</li>\n<li><strong>为什么重要</strong>：「先理解再行动」的路线可能比直接端到端训练更高效，代表世界模型的新思路。</li>\n<li><strong>链接</strong>：<a href=\"https://www.qbitai.com/2026/07/446075.html\" target=\"_blank\">https://www.qbitai.com/2026/07/446075.html</a></li>\n</ul>\n<h3>大晓全开源首个「统一具身基模型」ACE-Brain-0.5，登顶多项 SOTA</h3>\n<ul>\n<li><strong>来源</strong>：雷锋网</li>\n<li><strong>摘要</strong>：大晓科技全开源 ACE-Brain-0.5，一个统一的具身基础模型，在多项全球 SOTA 评测中登顶，朝向 Physical Agentic AI。</li>\n<li><strong>为什么重要</strong>：国内团队在具身基模型赛道的有力声音，开源策略有助于生态建设。</li>\n<li><strong>链接</strong>：<a href=\"https://www.leiphone.com/category/ai/YTCPIZ2kIbjtt6CX.html\" target=\"_blank\">https://www.leiphone.com/category/ai/YTCPIZ2kIbjtt6CX.html</a></li>\n</ul>\n<h3>魔芯 MoWorld 世界模型：50FPS、成本打掉 70%</h3>\n<ul>\n<li><strong>来源</strong>：量子位</li>\n<li var BASICS = [{"id": "b1", "title": "什么是人工智能", "level": "入门", "what": "人工智能（AI）是让计算机模拟人类智能的技术。它包括学习、推理、感知和决策能力。", "why": "理解 AI 的基本定义是进入这个领域的第一步。现代 AI 主要基于机器学习，让计算机从数据中自动学习模式，而非人工编写规则。", "tags": "AI基础,概念"}, {"id": "b2", "title": "机器学习基础", "level": "入门", "what": "机器学习是 AI 的核心方法——让计算机通过数据训练来改进性能，而非显式编程。主要分为监督学习、无监督学习和强化学习三类。", "why": "几乎所有现代 AI 应用（推荐系统、图像识别、语音助手）都基于机器学习。理解这三类学习方式是后续深入学习的基础。", "tags": "ML,基础"}, {"id": "b3", "title": "深度学习简介", "level": "入门", "what": "深度学习使用多层神经网络从大量数据中自动提取特征。代表性的架构包括 CNN（图像）、RNN/LSTM（序列）、Transformer（语言）。", "why": "2012 年 AlexNet 在图像识别上的突破开启了深度学习时代。如今 ChatGPT、Stable Diffusion 等生成式 AI 都基于深度学习。", "tags": "DL,神经网络"}, {"id": "b4", "title": "大语言模型（LLM）是什么", "level": "入门", "what": "大语言模型是通过海量文本训练的巨型神经网络，能够理解和生成人类语言。代表有 GPT-4、Claude、文心一言等。它们通过预测下一个词来学习语言的深层规律。", "why": "LLM 是当前 AI 浪潮的核心。理解它的基本原理（预训练+微调+对齐）有助于判断其能力和局限。", "tags": "LLM,GPT,Claude"}, {"id": "b5", "title": "Prompt 工程入门", "level": "入门", "what": "Prompt 是与大模型交流的「指令」。好的 Prompt 需要包含角色设定、任务描述、输出格式和示例。常用技巧包括 Few-shot、Chain-of-Thought（思维链）、角色扮演等。", "why": "掌握 Prompt 工程能大幅提升与 AI 协作的效率。它是非技术人员利用 AI 能力的最直接方式。", "tags": "Prompt,技巧"}, {"id": "b6", "title": "Transformer 架构", "level": "进阶", "what": "Transformer 是 2017 年由 Google 提出的神经网络架构，用「自注意力机制」替代了传统的循环结构。它由编码器和解码器组成，核心创新是让模型在处理每个词时都能直接关注到输入中的所有其他词。", "why": "Transformer 是 GPT、BERT、Claude 等所有现代大模型的基石。理解它才能真正理解 LLM 的工作原理。", "tags": "Transformer,注意力,架构"}, {"id": "b7", "title": "注意力机制", "level": "进阶", "what": "注意力机制让模型在处理信息时能够「关注」重要的部分。自注意力（Self-Attention）计算每个词与其他所有词的相关性权重，多头注意力（Multi-Head Attention）则从多个角度同时捕捉关系。", "why": "注意力机制是 Transformer 的灵魂，也是大模型能够理解长文本、捕捉复杂语义关系的关键。", "tags": "Attention,核心机制"}, {"id": "b8", "title": "微调与 LoRA", "level": "进阶", "what": "微调（Fine-tuning）是在预训练模型基础上用特定领域数据继续训练。LoRA（Low-Rank Adaptation）是一种高效微调方法，只训练少量新增参数，大幅降低计算成本。", "why": "全量微调大模型需要数百 GB 显存，LoRA 让个人开发者也能在消费级 GPU 上定制模型。这是 AI 民主化的关键技术。", "tags": "Fine-tuning,LoRA,PEFT"}, {"id": "b9", "title": "RAG 检索增强生成", "level": "进阶", "what": "RAG 在模型生成回答前，先从外部知识库检索相关文档，将检索结果与用户问题一起输入模型。这解决了 LLM 的「幻觉」问题和知识截止日期的限制。", "why": "RAG 是企业落地大模型的首选方案——不需重新训练模型，只需维护知识库即可让模型回答最新的、领域特定的问题。", "tags": "RAG,检索,知识库"}, {"id": "b10", "title": "Agent 与工具调用", "level": "进阶", "what": "AI Agent 是能自主规划、使用工具、执行多步任务的智能体。它不只是回答问题，还能调用 API、查询数据库、操作文件。关键技术包括 ReAct 模式、Function Calling 和记忆管理。", "why": "Agent 是 AI 从「聊天工具」进化为「数字员工」的关键一步。2025-2026 年 Agent 已成为各大公司竞争的核心赛道。", "tags": "Agent,Function Calling,Tool Use"}, {"id": "b11", "title": "MoE 混合专家模型", "level": "专家", "what": "MoE（Mixture of Experts）将模型拆分为多个「专家」子网络，每次只激活其中一部分。这大幅降低了推理成本，同时保持了模型容量。代表有 Mixtral、Grok-4.5 等。", "why": "MoE 解决了「模型越大越慢」的矛盾——万亿参数模型也能高效推理。这是各家大模型降本增效的核心技术路线。", "tags": "MoE,架构,降本"}, {"id": "b12", "title": "RLHF 对齐训练", "level": "专家", "what": "RLHF（人类反馈强化学习）是让模型输出符合人类偏好的关键技术。流程：收集人类偏好数据 → 训练奖励模型 → 用强化学习微调模型。这是 ChatGPT 成功的核心秘诀。", "why": "RLHF 解释了为什么相同规模的模型，有的「好用」有的「不好用」。它是连接「强大模型」和「有用模型」的桥梁。", "tags": "RLHF,对齐,安全"}, {"id": "b13", "title": "世界模型", "level": "专家", "what": "世界模型是能预测环境变化的 AI 系统。它学习物理世界的因果规律，不仅能「看到」当前状态，还能「想象」未来状态。在具身智能、自动驾驶、游戏 AI 中有广泛应用。", "why": "世界模型被认为是通向 AGI 的关键路径之一。LeCun 认为：没有世界模型，AI 就无法真正理解物理现实。2026 年蚂蚁灵波 LingBot-World 2.0 实现了小时级实时世界模型生成。", "tags": "世界模型,AGI,具身智能"}, {"id": "b14", "title": "具身智能", "level": "专家", "what": "具身智能是让 AI 在物理世界中感知、推理和行动的技术。它结合了计算机视觉、自然语言和机器人控制，核心挑战是 sim-to-real 迁移和通用操控能力。", "why": "具身智能是 2026 年最热的 AI 方向之一。RoboDojo 基准显示最强模型仅有 12.8/100 分，与人类差距巨大——这正是巨大的机会空间。", "tags": "Embodied AI,机器人,VLA"}, {"id": "b15", "title": "多模态融合", "level": "专家", "what": "多模态 AI 能同时理解文本、图像、音频、视频等多种信息形态。关键技术包括跨模态对齐（如 CLIP）、多模态编码器和统一的表示空间。GPT-4V、Gemini 都是多模态模型。", "why": "真实世界是多模态的，纯文本模型的天花板已经可见。多模态能力是下一代 AI 应用的基础——从医疗影像诊断到自动驾驶感知。", "tags": "多模态,CLIP,Vision-Language"}];
var favs=JSON.parse(localStorage.getItem('aiweekly_favs')||'{}');
var LANG=localStorage.getItem('aiweekly_lang')||'zh-CN';
var DARK=localStorage.getItem('aiweekly_dark')==='true';
var FONT=localStorage.getItem('aiweekly_font')||'md';

var I18N={
  title:{'zh-CN':'🤖 AI Weekly','zh-TW':'🤖 AI Weekly','en':'🤖 AI Weekly'},
  search:{'zh-CN':'搜索周报...','zh-TW':'搜尋週報...','en':'Search reports...'},
  back:{'zh-CN':'← 返回','zh-TW':'← 返回','en':'← Back'},
  tab_reports:{'zh-CN':'周报','zh-TW':'週報','en':'Reports'},
  tab_kb:{'zh-CN':'基础知识','zh-TW':'基礎知識','en':'Basics'},
  tab_settings:{'zh-CN':'设置','zh-TW':'設定','en':'Settings'},
  appearance:{'zh-CN':'外观','zh-TW':'外觀','en':'Appearance'},
  dark_mode:{'zh-CN':'黑夜模式','zh-TW':'黑夜模式','en':'Dark Mode'},
  font_size:{'zh-CN':'字体大小','zh-TW':'字體大小','en':'Font Size'},
  font_sm:{'zh-CN':'小','zh-TW':'小','en':'S'},
  font_md:{'zh-CN':'中','zh-TW':'中','en':'M'},
  font_lg:{'zh-CN':'大','zh-TW':'大','en':'L'},
  language:{'zh-CN':'语言','zh-TW':'語言','en':'Language'},
  ui_lang:{'zh-CN':'界面语言','zh-TW':'界面語言','en':'UI Language'},
  zh_cn:{'zh-CN':'简体中文','zh-TW':'簡體中文','en':'Simplified Chinese'},
  zh_tw:{'zh-CN':'繁體中文','zh-TW':'繁體中文','en':'Traditional Chinese'},
  en:{'zh-CN':'English','zh-TW':'English','en':'English'},
  about:{'zh-CN':'关于','zh-TW':'關於','en':'About'},
  read:{'zh-CN':'阅读','zh-TW':'閱讀','en':'Read'},
  save:{'zh-CN':'☆ 收藏','zh-TW':'☆ 收藏','en':'☆ Save'},
  saved:{'zh-CN':'★ 已收藏','zh-TW':'★ 已收藏','en':'★ Saved'},
  no_reports:{'zh-CN':'没有找到周报','zh-TW':'沒有找到週報','en':'No reports yet'},
  no_kb:{'zh-CN':'暂无知识条目','zh-TW':'暫無知識條目','en':'No knowledge entries'},
  source:{'zh-CN':'来源','zh-TW':'來源','en':'Source'},
};

function t(key){var m=I18N[key];return m?(m[LANG]||m['zh-CN']||key):key;}
function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    if(el.tagName==='OPTION')return;
    var k=el.getAttribute('data-lang');if(k&&I18N[k])el.textContent=t(k);
  });
  document.querySelectorAll('[data-lang-placeholder]').forEach(function(el){
    var k=el.getAttribute('data-lang-placeholder');if(k&&I18N[k])el.placeholder=t(k);
  });
  document.getElementById('lang-select').value=LANG;
  renderList();
  if(document.getElementById('page-kb').classList.contains('active'))renderKB('all');
}
function setLang(l){LANG=l;localStorage.setItem('aiweekly_lang',l);applyLang();}
function toggleDark(){DARK=!DARK;localStorage.setItem('aiweekly_dark',DARK);document.body.classList.toggle('dark',DARK);document.getElementById('dark-toggle').classList.toggle('on',DARK);}
function setFont(s){FONT=s;localStorage.setItem('aiweekly_font',s);document.body.classList.remove('font-sm','font-md','font-lg');document.body.classList.add('font-'+s);document.querySelectorAll('.font-btns button').forEach(function(b){b.classList.toggle('active',b.id==='font-'+s);});}
if(DARK){document.body.classList.add('dark');document.getElementById('dark-toggle').classList.add('on');}
document.body.classList.add('font-'+FONT);
applyLang();

function showPage(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  var page=document.getElementById('page-'+name);if(page)page.classList.add('active');
  var tab=document.querySelector('[data-page="'+name+'"]');if(tab)tab.classList.add('active');
  if(name==='kb')renderKB('');
  if(name==='list')renderList();
}

function renderList(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var html='';
  REPORTS.filter(function(r){return !q||(r.title+r.summary+r.keywords).toLowerCase().indexOf(q)>=0;}).forEach(function(r){
    var isFav=favs[r.id];
    var tags=(r.keywords||'').split(/[#\s]+/).filter(Boolean).slice(0,6);
    html+='<div class="card" data-action="detail" data-id="'+r.id+'" style="cursor:pointer"><h3>'+r.title+'</h3><div class="date">'+r.period+'</div><div class="summary">'+r.summary+'</div>';
    if(tags.length)html+='<div class="tags">'+tags.map(function(t){return'<span class="tag">#'+t+'</span>';}).join('')+'</div>';
    html+='<div class="actions"><button data-action="full" data-id="'+r.id+'">'+t('read')+'</button>';
    html+='<button class="'+(isFav?'fav':'')+'" data-action="fav" data-id="'+r.id+'">'+(isFav?t('saved'):t('save'))+'</button></div></div>';
  });
  if(!REPORTS.filter(function(r){return !q||(r.title+r.summary+r.keywords).toLowerCase().indexOf(q)>=0;}).length)
    html='<div class="card" style="text-align:center;color:var(--text3);padding:40px">'+t('no_reports')+'</div>';
  document.getElementById('report-list').innerHTML=html;
}

function openDetail(id){
  var r=REPORTS.find(function(x){return x.id===id;});
  if(!r)return;
  var items=KB.filter(function(k){return k.report_id===id;});
  var html='<h1>'+r.title+'</h1><div class="date">'+r.period+'</div><hr>';
  if(items.length){
    items.forEach(function(item){
      html+='<div class="knowledge-item" data-title="'+item.title.replace(/"/g,'&quot;')+'" style="margin-bottom:10px"><div class="ki-title">'+item.title+'</div><div class="ki-what">'+(item.what||'').substring(0,120)+'</div><div class="ki-meta">'+item.source+(item.link?' · <a href="'+item.link+'" target="_blank" style="color:var(--accent)">link</a>':'')+'</div></div>';
    });
  }else{
    html+=r.body;
  }
  document.getElementById('detail-content').innerHTML=html;
  showPage('detail');window.scrollTo(0,0);
}

function openFull(id){
  var r=REPORTS.find(function(x){return x.id===id;});
  if(!r)return;
  document.getElementById('detail-content').innerHTML='<h1>'+r.title+'</h1><div class="date">'+r.period+'</div>'+r.body;
  showPage('detail');window.scrollTo(0,0);
}

function toggleFav(id){favs[id]=!favs[id];localStorage.setItem('aiweekly_favs',JSON.stringify(favs));renderList();}

function renderKB(filter){
  var levels=['入门','进阶','专家'];
  var colors={'入门':'#10b981','进阶':'#f59e0b','专家':'#ef4444'};
  var fhtml='';
  levels.forEach(function(lv){
    var count=BASICS.filter(function(b){return b.level===lv;}).length;
    fhtml+='<button class="'+(filter===lv?'active':'')+'" onclick="renderKB(\''+lv+'\')" style="'+(filter===lv?'':'border-color:'+colors[lv]+';color:'+colors[lv])+'">'+lv+' ('+count+')</button>';
  });
  document.getElementById('kb-filter').innerHTML=fhtml;
  var html='';
  levels.forEach(function(lv){
    if(filter&&filter!==lv)return;
    var items=BASICS.filter(function(b){return b.level===lv;});
    if(!items.length)return;
    html+='<div class="knowledge-section"><h3>'+lv+' <span style="font-size:11px;color:'+colors[lv]+'">'+items.length+' items</span></h3>';
    items.forEach(function(item){
      var tagHtml='';
      if(item.tags){item.tags.split(',').slice(0,3).forEach(function(t){tagHtml+='<span class="level-tag" style="background:'+colors[lv]+'20;color:'+colors[lv]+'">'+t+'</span>';});}
      html+='<div class="knowledge-item" data-title="'+item.title.replace(/"/g,'&quot;')+'" data-basic="'+item.id+'"><div class="ki-title">'+item.title+tagHtml+'</div><div class="ki-what">'+(item.what||'').substring(0,120)+'</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('kb-content').innerHTML=html||'<div class="card" style="text-align:center;color:var(--text3);padding:40px">No entries</div>';
}

function openKbDetail(title){
  var item=KB.find(function(k){return k.title===title;});
  var basic=BASICS.find(function(b){return b.title===title;});
  var html='';
  if(basic){
    var lc={'入门':'#10b981','进阶':'#f59e0b','专家':'#ef4444'};
    html+='<h4>'+basic.title+' <span style="font-size:11px;background:'+lc[basic.level]+'20;color:'+lc[basic.level]+';padding:2px 8px;border-radius:10px;margin-left:8px">'+basic.level+'</span></h4>';
    if(basic.what)html+='<p style="margin-top:16px"><strong>What it is:</strong><br>'+basic.what+'</p>';
    if(basic.why)html+='<p style="color:var(--text2);margin-top:12px"><strong>Why it matters:</strong><br>'+basic.why+'</p>';
  }else if(item){
    html+='<h4>'+item.title+'</h4>';
    html+='<p style="color:var(--text3);font-size:calc(var(--font) - 2px)">'+item.section+(item.sub?' › '+item.sub:'')+' · '+t('source')+': '+item.source+'</p><hr>';
    if(item.what){html+='<p><strong>'+item.what+'</strong></p>';}
    if(item.why){html+='<p style="color:var(--text2)">'+item.why+'</p>';}
    if(item.link)html+='<hr><p style="font-size:12px">'+t('source')+': <a href="'+item.link+'" target="_blank">'+(item.link||'').substring(0,80)+'</a></p>';
  }
  if(!html)return;
  document.getElementById('kb-detail-content').innerHTML=html;
  showPage('kb-detail');window.scrollTo(0,0);
}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(el){
    var action=el.getAttribute('data-action');
    var id=el.getAttribute('data-id');
    if(action==='detail')openDetail(id);
    if(action==='full')openFull(id);
    if(action==='fav')toggleFav(id);
    return;
  }
  el=e.target.closest('.knowledge-item');
  if(el){
    var title=el.getAttribute('data-title');
    var bid=el.getAttribute('data-basic');
    if(bid){var b=BASICS.find(function(x){return x.id===bid;});if(b)title=b.title;}
    if(title)openKbDetail(title);
  }
});

renderList();
</script>
</body>
</html>
